<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bài học - EduLearn</title>
    <link rel="stylesheet" href="/css/styleStudent.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
        .admin-table th, .admin-table td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .admin-table th { background: #f8f9fa; font-weight: 600; color: #475569; }
        .admin-table tr:hover { background: #fdfdfd; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 12px; width: 500px; max-width: 90%; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .modal-header h3 { margin: 0; font-size: 1.3rem; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #aaa; }
        .close-btn:hover { color: #333; }
        .action-btns { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <header class="site-header"></header>

    <main style="padding-top: 40px; padding-bottom: 60px; background: #f8f9fa; min-height: calc(100vh - 70px);">
        <div class="container">
            <div style="margin-bottom: 20px;">
                <a href="/admin/courses.html" style="text-decoration: none; color: #666; font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Quay lại quản lý khóa học</a>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h2 id="courseTitleHeader" style="margin: 0 0 5px 0;">Bài học của khóa học</h2>
                    <p style="margin: 0; color: #666;" id="courseSubHeader">Quản lý và tải lên video bài giảng</p>
                </div>
                <button id="addLessonBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Thêm Bài Học Mới</button>
            </div>

            <!-- Data Table -->
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th style="width: 100px;">Thứ Tự</th>
                            <th>Tên Bài Học</th>
                            <th>Mã Bài Học</th>
                            <th>Video Bài Giảng</th>
                            <th style="text-align: center; width: 200px;">Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="lessonTableBody">
                        <!-- Loaded dynamically -->
                        <tr><td colspan="5" style="text-align: center; padding: 40px; color: #666;">Đang tải danh sách bài học...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal Overlay -->
    <div class="modal" id="lessonModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Thêm Bài Học Mới</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            
            <div id="modalAlert" class="alert alert-danger" style="display: none; margin-bottom: 15px;"></div>

            <form id="lessonForm" enctype="multipart/form-data">
                <input type="hidden" id="formMode" value="create">
                <input type="hidden" id="MaBaiHoc" name="MaBaiHoc">

                <!-- Tên bài học -->
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="TieuDe">Tên bài học</label>
                    <input type="text" id="TieuDe" name="TieuDe" required>
                </div>

                <!-- Thứ tự bài học -->
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="ThuTu">Thứ tự hiển thị</label>
                    <input type="number" id="ThuTu" name="ThuTu" required>
                </div>

                <!-- Video bài học -->
                <div class="form-group" style="margin-bottom: 25px;">
                    <label for="VideoFile" id="videoLabel">Video bài giảng</label>
                    <input type="file" id="VideoFile" name="videoFile" accept="video/*">
                    <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: #666;" id="videoHelpText">Định dạng hỗ trợ: MP4, WebM (Tối đa 100MB)</p>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn btn-outline" id="cancelModalBtn" style="padding: 10px 20px;">Hủy bỏ</button>
                    <button type="submit" class="btn btn-primary" id="saveLessonBtn" style="padding: 10px 20px;">Lưu lại</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="site-footer"></footer>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/admin-lessons.js"></script>
</body>
</html>
