<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Khóa học - EduLearn</title>
    <link rel="stylesheet" href="/css/styleStudent.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="site-header"></header>

    <main class="courses-page-layout">
        <div class="container" style="padding-top: 40px; padding-bottom: 60px;">
            <div class="section-header" style="text-align: left; margin-bottom: 30px;">
                <h2>Tất Cả Khóa Học</h2>
                <p>Nâng cao tri thức với các bài giảng chi tiết và lộ trình học tập hiệu quả.</p>
            </div>

            <div class="courses-layout" style="display: flex; gap: 30px; align-items: flex-start;">
                <!-- Sidebar bộ lọc -->
                <aside class="sidebar-filter" style="width: 280px; flex-shrink: 0; background: #f8f9fa; padding: 25px; border-radius: 12px; border: 1px solid #eee;">
                    <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.15rem; font-weight: 600;">Tìm kiếm khóa học</h3>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <input type="text" id="searchInput" placeholder="Tên khóa học..." style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.9rem;">
                    </div>

                    <h3 style="margin-bottom: 15px; font-size: 1.15rem; font-weight: 600;">Môn học</h3>
                    <ul class="subject-list" id="subjectFilterList" style="list-style: none; padding: 0; margin: 0;">
                        <!-- Populate subjects -->
                        <li style="margin-bottom: 10px;">
                            <a href="#" class="subject-link active" data-subject="" style="text-decoration: none; color: var(--primary-color); font-weight: 500; font-size: 0.95rem;">Tất cả môn học</a>
                        </li>
                    </ul>
                </aside>

                <!-- Lưới hiển thị khóa học -->
                <div class="course-list-container" style="flex: 1;">
                    <div class="course-grid" id="coursesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;">
                        <div class="loading">Đang tải danh sách khóa học...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer"></footer>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/courses.js"></script>
</body>
</html>
